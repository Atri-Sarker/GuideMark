<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Guidemark</title>
    <!-- MY CSS -->
    <link rel="stylesheet" href="box.css">
    <!-- APP -->
     <meta name="viewport" content="width=device-width">
     <link rel="manifest" href="manifest.json">
     <meta name="mobile-web-app-capable" content="yes">
     <meta name="theme-color" content="#000000">
     <link rel="icon" type="image/png" href="apple-touch-icon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>
<body>
    <div id="guideEditScreen" class="screen"></div>
    <div id="guideListScreen" class="screen"></div>
    <div id="inProgressScreen" class="screen"></div>
    <div id="guideInProgressScreen" class="screen"></div>
    <div id="breakSpace"></div>
    <footer id="footerRadio">
        <input type="radio" id="guideListRadio" name="view" value="guideList" checked>
        <label for="guideListRadio">Guide List</label>
        <input type="radio" id="inProgressRadio" name="view" value="inProgress">
        <label for="inProgressRadio">In Progress</label>
    </footer>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
